#
# This file drives code generation for both sides automatically.
# After any change run: npm run compile
#
# ── Addition scenario ─────────────────────────────────────────
#   Add a new endpoint here → re-run the compiler → code syncs
#
# ── Shock scenario ────────────────────────────────────────────
#   Run: npm run demo:shock  to see how a type change breaks the code
# ═══════════════════════════════════════════════════════════════

version: "2.0.0"

info:
  title: Product Catalog API
  description: CCDA PoC — multi-endpoint demonstration

endpoints:

  - name: Products
    endpoint: /products
    method: GET
    auth:
      required: true
      roles:
        - admin
        - manager
    response:
      id: integer
      title: string
      price: number
      in_stock: boolean
      category: string

  - name: Categories
    endpoint: /categories
    method: GET
    auth:
      required: false
      roles: []
    response:
      id: integer
      name: string
      product_count: integer
